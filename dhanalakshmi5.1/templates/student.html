<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Student Portal</title>
  </head>
  <body>
    <nav class="navbar navbar-light bg-light">
      <div class="container-fluid">
        <span class="navbar-brand">Student Portal</span>
        <div>
          <a class="btn btn-info btn-sm me-2" href="/browse">Browse & Sign Petitions</a>
          <a class="btn btn-outline-secondary btn-sm" href="/logout">Logout</a>
        </div>
      </div>
    </nav>
    <div class="container py-4">
      <h4>Submit Petition</h4>
      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="post">
        <input name="title" class="form-control" placeholder="Title" required>
        <textarea name="description" class="form-control mt-2" placeholder="Description" rows="4" required></textarea>
        <button class="btn btn-primary mt-2">Submit</button>
      </form>

      <hr>
      <h5>Your petitions</h5>
      {% for p in petitions %}
      <div class="card mb-2">
        <div class="card-body">
          <h6>{{ p[1] }}</h6>
          <p>{{ p[2] }}</p>
          <small class="text-muted">Category: {{ p[3] }} — Priority: {{ p[4] }} — Status: {{ p[5] }}</small>
        </div>
      </div>
      {% else %}
      <p class="text-muted">No petitions yet.</p>
      {% endfor %}
    </div>
  </body>
</html>
